# ffmpeg-sys-next uses vcpkg only for `x86_64-pc-windows-msvc`. With the default
# `*-windows-gnu` host, vcpkg is skipped and the build falls through to pkg-config (fails).
[build]
target = "x86_64-pc-windows-msvc"

# Статическая линковка FFmpeg (`gifcap-core` default `static-ffmpeg`) — нужен triplet с .lib, не DLL.
[env]
VCPKGRS_DEFAULT_TRIPLET = "x64-windows-static-md-release"
# Два префикса: `vcpkg_installed_full` и `vcpkg_installed_slim` (--x-install-root в build-*.bash).
# По умолчанию — full; slim: `export FFMPEG_DIR=.../vcpkg_installed_slim/x64-windows-static-md-release` или build-slim.bash.
# force=false: скрипт может переопределить FFMPEG_DIR перед `cargo build`.
FFMPEG_DIR = { value = "vcpkg_installed_full/x64-windows-static-md-release", relative = true, force = false }
