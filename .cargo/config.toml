# ffmpeg-sys-next uses vcpkg only for `x86_64-pc-windows-msvc`. With the default
# `*-windows-gnu` host, vcpkg is skipped and the build falls through to pkg-config (fails).
[build]
target = "x86_64-pc-windows-msvc"

# Static FFmpeg linking (`gifcap-core` default `static-ffmpeg`) needs a triplet with .lib artifacts, not DLLs.
[env]
VCPKGRS_DEFAULT_TRIPLET = "x64-windows-static-md-release"
# Two prefixes are used: `vcpkg_installed_full` and `vcpkg_installed_slim` (`--x-install-root` in build-*.bash).
# Default is full; for slim use `export FFMPEG_DIR=.../vcpkg_installed_slim/x64-windows-static-md-release` or run build-slim.bash.
# force=false lets scripts override FFMPEG_DIR before `cargo build`.
FFMPEG_DIR = { value = "vcpkg_installed_full/x64-windows-static-md-release", relative = true, force = false }
